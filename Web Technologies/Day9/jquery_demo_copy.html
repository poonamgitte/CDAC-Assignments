<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script>
      function sum() {
        //var num1 = document.getElementById("num1").value
        var num1 = $("#num1").val();
        var num2 = $("#num2").val();
        
        //radio button example
        var gender = $(".gender:checked").val()
        console.log(gender)

        var lang = []
        //checkbox example
        $(".lang:checked").each(function(){
            lang.push($(this).val())
        })

        console.log(lang)

        let res = Number(num1) + Number(num2);
        $(".res").html("Result is" + res); // innerHTML
      }

      $(document).ready(function () {
        $("#sum").click(sum);
      });
    </script>
  </head>
  <body>
    Enter number 1 : <input type="text" id="num1" /> Enter number 2 :
    <input type="text" id="num2" />

    <br>
    Gender : <input type="radio" name="gender" class="gender" value="male">Male
    <input type="radio" name="gender" class="gender" value="female">Female
    <br>

    <br>
    lang: <input type="checkbox" name="lang" class="lang" value="Hindi">Hindi
     <input type="checkbox" name="lang" class="lang" value="Marathi">Marathi
      <input type="checkbox" name="lang" class="lang" value="English">English
  </br>


    <button id="sum">Sum</button>
    <div class="res"></div>

  </body>
</html>
