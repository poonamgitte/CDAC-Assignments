<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server-side Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column align-items-center vh-100 justify-content-center">

    <div class="card p-4 shadow w-50">
        <h3 class="text-center mb-3">Server-side Calculator</h3>

        <form id="calcForm">
            <div class="mb-3">
                Number 1:
                <input type="number" class="form-control" id="num1" required>
            </div>

            <div class="mb-3">
                Number 2:
                <input type="number" class="form-control" id="num2" required>
            </div>

            <div class="mb-3">
                Operation:
                <div class="form-check">
                    <input type="radio" name="operation" value="add" class="form-check-input" id="add" required>
                    <label class="form-check-label" for="add">Addition</label>
                </div>
                <div class="form-check">
                    <input type="radio" name="operation" value="sub" class="form-check-input" id="sub">
                    <label class="form-check-label" for="sub">Subtraction</label>
                </div>
                <div class="form-check">
                    <input type="radio" name="operation" value="mul" class="form-check-input" id="mul">
                    <label class="form-check-label" for="mul">Multiplication</label>
                </div>
                <div class="form-check">
                    <input type="radio" name="operation" value="div" class="form-check-input" id="div">
                    <label class="form-check-label" for="div">Division</label>
                </div>
                <div class="form-check">
                    <input type="radio" name="operation" value="mod" class="form-check-input" id="mod">
                    <label class="form-check-label" for="mod">Modulus</label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Calculate</button>
        </form>

        <div class="mt-3">
            <h4>Result: <span id="result">--</span></h4>
        </div>
    </div>

    <script>
        const form = document.getElementById('calcForm');
        const resultEl = document.getElementById('result');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            const operation = document.querySelector('input[name="operation"]:checked').value;

            fetch('http://localhost:5000/calculate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ num1, num2, operation })
            })
            .then(res => res.json())
            .then(data => {
                resultEl.textContent = data.result;
            })
            .catch(err => console.log(err));
        });
    </script>
</body>
</html>
