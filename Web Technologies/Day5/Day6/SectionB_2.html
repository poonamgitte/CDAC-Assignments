<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pizza Shop 2.0</title>
    <!-- Load Bootstrap 5 CSS for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        /* Custom styles for layout and error messages */
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 800px;
        }
        /* Custom container for original table layout */
        .table-container {
            margin-bottom: 20px;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        .error-message-box {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Custom Message Box for validation errors (replaces alert()) -->
        <div id="custom-alert" class="error-message-box"></div>

        <div class="table-container">
            <!-- Table to input data -->
            <!-- Applied Bootstrap classes for tables, inputs, and layout -->
            <table class="table table-bordered w-100" style="height: 400px;">
                <thead>
                    <tr>
                        <th colspan="2" class="text-center bg-primary text-white">Pizza Shop 2.0</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="width: 30%;">Name</td>
                        <td>
                            <input id="name" name="name" class="form-control" />
                        </td>
                    </tr>

                    <tr>
                        <td>Pizza Topping</td>
                        <td>
                            <div class="form-check form-check-inline">
                                <input type="radio" name="topping" id="supreme" value="Supreme" class="form-check-input" />
                                <label for="supreme" class="form-check-label">Supreme</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input
                                    type="radio"
                                    name="topping"
                                    id="vegetarian"
                                    value="Vegetarian"
                                    class="form-check-input"
                                />
                                <label for="vegetarian" class="form-check-label">Vegetarian</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input
                                    type="radio"
                                    name="topping"
                                    id="hawaiian"
                                    value="Hawaiian"
                                    class="form-check-input"
                                />
                                <label for="hawaiian" class="form-check-label">Hawaiian</label>
                            </div>
                        </td>
                    </tr>

                    <tr>
                        <td>Pizza Sauce</td>
                        <td>
                            <select id="sauce" class="form-select">
                                <option name="Tomato" value="Tomato">Tomato</option>
                                <option name="Soya" value="Soya">Soya</option>
                                <option name="chilli" value="chilli">Chilli</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td>Optional Extras</td>
                        <td>
                            <div class="form-check form-check-inline">
                                <input
                                    name="Extra Cheese"
                                    type="checkbox"
                                    id="ext-cheese"
                                    class="form-check-input checkbox"
                                />
                                <label for="ext-cheese" class="form-check-label">Extra Cheese</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input
                                    name="Gluten Free Base"
                                    type="checkbox"
                                    id="ext-base"
                                    class="form-check-input checkbox"
                                />
                                <label for="ext-base" class="form-check-label">Gluten Free Base</label>
                            </div>
                        </td>
                    </tr>

                    <tr>
                        <td colspan="2">
                            <label class="form-label">Delivery Instructions:</label>
                            <textarea rows="5" id="description" class="form-control"></textarea>
                        </td>
                    </tr>

                    <tr>
                        <td colspan="2" class="text-center">
                            <button onclick="saveOrder()" class="btn btn-success w-50">Send my Order</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Table to show data -->
        <div class="table-container">
            <h5 class="text-center mb-3">Order Details</h5>
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead>
                        <tr class="table-dark">
                            <th colspan="5" class="text-center">Order Details</th>
                        </tr>
                        <tr>
                            <th>Name</th>
                            <th>Pizza Topping</th>
                            <th>Pizza Sauce</th>
                            <th>Optional Extras</th>
                            <th>Delivery Instructions</th>
                        </tr>
                    </thead>
                    <tbody id="order-data"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // CRITICAL CHANGE: Custom function to replace forbidden alert() and display message on the UI
        function displayMessage(message, isError = true) {
            const msgBox = document.getElementById('custom-alert');
            
            // Create a new alert div
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert ${isError ? 'alert-danger' : 'alert-success'} alert-dismissible fade show`;
            alertDiv.setAttribute('role', 'alert');
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" onclick="this.parentElement.remove();"></button>
            `;
            
            // Add to the message container
            msgBox.appendChild(alertDiv);

            // Automatically hide after 4 seconds
            setTimeout(() => {
                if (alertDiv.classList.contains('show')) {
                    alertDiv.classList.remove('show');
                    alertDiv.classList.add('fade');
                    setTimeout(() => alertDiv.remove(), 150);
                }
            }, 4000);
        }

        function saveOrder() {
            var orderDataArray = []
            let isFormValid = true; // Flag to track overall validation

            var name = document.getElementById('name').value

            if (name.length != 5) {
                displayMessage('Name length must be 5 characters.', true); // Replaced alert()
                isFormValid = false;
            }

            var pizzaTopping = document.getElementsByName('topping')

            var pizzaToppingOp

            // Note: The original loop structure was slightly off but retained here
            for (let i = 0; i < pizzaTopping.length; i++) {
              if (pizzaTopping[i].checked) {
                pizzaToppingOp = pizzaTopping[i].value
              }
            }
            
            var sauce = document.getElementById('sauce').value

            let selectedTopping = ''
            const toppingRadios = document.getElementsByName('topping')
            for (const radio of toppingRadios) {
              if (radio.checked) {
                selectedTopping = radio.value
                break
              }
            }

            if (sauce === 'Tomato' && selectedTopping === 'Supreme') {
                displayMessage("Cannot select Tomato sauce and Supreme topping together.", true); // Replaced alert()
                isFormValid = false;
            }

            var extra_options = document.getElementsByClassName('checkbox')

            var extraOptionsArr = []

            for (let i = 0; i < 2; i++) {
              if (extra_options[i].checked) {
                var opName = extra_options[i].name

                extraOptionsArr.push(opName)
              }
            }

            var description = document
              .getElementById('description')
              .value.trim()

            const wordCount = description
              .split(/\s+/)
              .filter(word => word.length > 0).length

            if (wordCount < 5) {
                displayMessage('Delivery Instruction must have at least 5 words.', true); // Replaced alert()
                isFormValid = false;
            }
            
            // Stop if validation failed
            if (!isFormValid) {
                return;
            }
            
            // Order is valid, proceed with data saving and display
            
            var orderData = {
              name: name,
              pizzaToppingOp: pizzaToppingOp,
              sauce: sauce,
              extraOptionsArr: extraOptionsArr,
              description: description
            }

            orderDataArray.push(orderData)

            // The original logic used orderDataArray.name which is incorrect since orderDataArray is an array.
            // It uses pizzaToppingOp, sauce, extraOptionsArr, and description which are correct references.
            
            // Display success message
            displayMessage('Order Sent Successfully!', false);

            document.getElementById('order-data').innerHTML += `<tr> 
                <td>${name}</td>
                <td>${pizzaToppingOp}</td>
                <td>${sauce}</td>
                <td>${extraOptionsArr.join(', ')}</td>
                <td>${description}</td>
            </tr>`
        }
    </script>
    
    <!-- Load Bootstrap 5 JS for alert dismiss functionality -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" xintegrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
