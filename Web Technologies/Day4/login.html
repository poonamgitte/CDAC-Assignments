<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            /* border:1px solid black; */
            height: 98vh;
            display: flex;
            justify-content: center;
            align-items: center;

        }
        .login-box{
            padding:3rem;
            /* border: 1px solid black; */
            border-radius: 5px;
            background-color: aqua;
            width: 18rem;
        }
        .input-block{
            margin-bottom: 1rem;
        }
        .t-center{
            text-align: center;
        }
        .input-control{
            width: 100%;
            padding: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="input-block">
                <input type="text" placeholder="Username" class="input-control">
            </div>
            <div class="input-block">
                <input type="text" placeholder="Password" class="input-control">
            </div>
            <div class="input-block t-center">
                <button class="btn">Login</button>
            </div>
        </div>
    </div>
</body>
</html>
