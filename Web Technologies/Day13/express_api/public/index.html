<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      function saveData() {
        var name = document.getElementById("name").value;
        var email = document.getElementById("email").value;
        var user = { name: name, email: email };
        fetch("/api/user/new", {
          method: "POST",
          body: JSON.stringify(user),
          headers: { "Content-Type": "application/json" },
        })
          .then((res) => res.json())
          .then((data) => {
            console.log(data);
            document.getElementById("saveErr").innerHTML = data?.msg;
          })
          .catch((err) => console.log(err));
      }

      function fetchUsers() {
        fetch("/api/user/xyz", {
          method: "GET",
        })
          .then((res) => res.json())
          .then((data) => {
            console.log(data);
            generateHTML(data);
          })
          .catch((err) => console.log(err));
      }

      function generateHTML(data) {
        let htmlStr = "";
        data?.forEach((item) => {
          htmlStr += `<tr>
                    <td>${item?.name}</td>
                    <td>${item?.email}</td>
                    <td><button id="${item.email}">Delete</button></td>
            </tr>`;
        });
        document.getElementById("tableBody").innerHTML = htmlStr;
        data.forEach(item => {
            document.getElementById(`${item.email}`).addEventListener('click',deleteUser)
        })
      }

      function deleteUser() {
        var email = event.target.id
        console.log(email)
        let path= `/api/user/del?email=${email}`
        console.log(path)
        fetch(path, {
          method: "DELETE",
        })
          .then((res) => res.json())
          .then((data) => {
            console.log(data);
          })
          .catch((err) => console.log(err));
      }
    </script>
  </head>
  <body>
    Enter name : <input type="text" id="name" /><br />
    Enter email : <input type="text" id="email" /><br />
    <button id="saveBtn">Save</button><span id="saveErr"></span>
    <hr />
    <button id="showData">Show Users</button>
    <table border="1">
      <thead>
        <tr>
          <th>Name</th>
          <th>EMail</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <script>
      document.getElementById("saveBtn").addEventListener("click", saveData);
      document.getElementById("showData").addEventListener("click", fetchUsers);
    </script>
  </body>
</html>
