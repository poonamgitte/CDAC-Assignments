<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var fruits = []

        for(i = 0; i < 3; i++){
            var fruitName = prompt("Enter fruit name")
            fruits.push(fruitName)
        }

        /*  <ol><li>Apple</li><li>Banana</li><li>Mango</li></ol>
                
        */
 

        var htmlStr = "<ol>" 
        for(i = 0; i < 3 ; i++){
            htmlStr = htmlStr + "<li>" + fruits[i] + "</li>"
        }
        htmlStr = htmlStr + "</ol>"
        document.write(htmlStr)
        


    </script>
</head>
<body>
    
</body>
</html>
