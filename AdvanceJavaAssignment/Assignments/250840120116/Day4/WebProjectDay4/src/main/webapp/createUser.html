<html>
    <header>
     
    </header>
   <body>
       <form action='createUserServlet' method='POST'>
             <input type='text' placeholder='Enter your username' name='username' /><br/>
             <input type='password' placeholder='Enter your password'  name='password' required/><br/>
             <input type='password' placeholder='Confirm your password'  name='confirm_password' required/><br/>
             <input type='text' placeholder='Enter Name'  name='name' required/><br/>
             <input type='email' placeholder='Enter Email'  name='email' required/><br/>
             <input type='text' placeholder='Enter City'  name='city' required/><br/>
            <input type='submit' value='submit'/>
       </form>
       
        <p id='msg'></p>
         
         <script>
              const msg = document.getElementById("msg");
              
             
              const urlParams = new URLSearchParams(window.location.search);
              const msgValue = urlParams.get('msg');
              console.log({msgValue});
              
              if(msgValue != ""){
                  msg.textContent = msgValue;
              }
              
              
              setTimeout(()=>{
                	  msg.textContent ="";
              },3000);
              
            
         </script>
   </body>  
</html>
